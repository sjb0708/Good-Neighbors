<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Neighbors — Costa Blanca Villas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Full-screen beach background */
    .bg-photo {
      position: fixed;
      inset: 0;
      background-image: url('/images/login-bg.webp');
      background-size: cover;
      background-position: center 40%;
      z-index: 0;
    }

    /* Dark gradient overlay — heavier at top, lighter at bottom so beach shows */
    .bg-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(3, 4, 94, 0.55) 0%,
        rgba(0, 60, 120, 0.40) 40%,
        rgba(0, 30, 60, 0.50) 100%
      );
      z-index: 1;
    }

    /* Centered layout */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      padding: 24px 16px;
    }

    /* Login card */
    .login-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 44px 48px;
      width: min(420px, 100%);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.35),
        0 8px 24px rgba(0, 0, 0, 0.15);
      animation: cardIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 6px 20px rgba(0, 119, 182, 0.3);
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    .logo-headline {
      font-size: 22px;
      font-weight: 800;
      color: #0d1b2a;
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }

    .logo-tagline {
      font-size: 13.5px;
      color: #5a7184;
      font-weight: 400;
    }

    .neighborhood-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0, 119, 182, 0.08);
      border: 1px solid rgba(0, 119, 182, 0.18);
      border-radius: 20px;
      padding: 5px 12px;
      margin-top: 10px;
      font-size: 11.5px;
      font-weight: 600;
      color: #0077B6;
    }

    /* Form */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1.5px solid #dde4ed;
      border-radius: 11px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #1a2b3c;
      background: #f8fafc;
      transition: all 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #0077B6;
      background: white;
      box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.12);
    }

    input::placeholder { color: #a0aec0; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0077B6;
      color: white;
      border: none;
      border-radius: 11px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
      margin-top: 6px;
      letter-spacing: 0.1px;
    }

    .btn-login:hover {
      background: #005f92;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 119, 182, 0.4);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login.loading { opacity: 0.75; cursor: not-allowed; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 16px;
      color: #a0aec0;
      font-size: 12px;
      font-weight: 500;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8edf2;
    }

    /* Error */
    .error-msg {
      background: rgba(231, 111, 81, 0.09);
      border: 1px solid rgba(231, 111, 81, 0.28);
      border-radius: 10px;
      padding: 10px 13px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 14px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* Quick login */
    .quick-login {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .quick-login .ql-full {
      grid-column: 1 / -1;
    }

    .quick-login-btn {
      flex: 1;
      padding: 9px 6px;
      background: white;
      border: 1.5px solid #dde4ed;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .quick-login-btn:hover {
      border-color: #0077B6;
      color: #0077B6;
      background: rgba(0, 119, 182, 0.04);
      transform: translateY(-1px);
    }

    .ql-inner {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }

    .ql-name {
      font-size: 12px;
      font-weight: 700;
      color: inherit;
    }

    .ql-role {
      font-size: 10px;
      font-weight: 500;
      color: #a0aec0;
    }

    .quick-login-btn:hover .ql-role { color: #5a9fc7; }

    .avatar-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    /* Footer */
    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 11.5px;
      color: #a0aec0;
    }

    .footer-text a {
      color: #0077B6;
      text-decoration: none;
      font-weight: 500;
    }

    /* Location credit bottom-left */
    .photo-credit {
      position: fixed;
      bottom: 16px;
      left: 20px;
      z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-family: 'Inter', sans-serif;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; border-radius: 20px; }
      .logo-icon { width: 64px; height: 64px; }
    }
  </style>
</head>
<body>

  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>

  <div class="page">
    <div class="login-card">

      <div class="logo-area">
        <div class="logo-icon">
          <img src="/logo.png" alt="Good Neighbors">
        </div>
        <div class="logo-headline">Good Neighbors</div>
        <div class="logo-tagline">Your community, connected</div>
        <div class="neighborhood-badge">📍 Costa Blanca Villas · Farallón, Panama</div>
      </div>

      <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      </form>

      <div class="divider">or continue as</div>

      <div class="quick-login" style="grid-template-columns:1fr;">
        <button class="quick-login-btn" onclick="quickLogin('mike','beach123')">
          <span class="avatar-dot" style="background:#F4A261">MH</span>
          <span class="ql-inner">
            <span class="ql-name">Mike Hart</span>
            <span class="ql-role">Demo Neighbor</span>
          </span>
        </button>
      </div>

      <div class="footer-text">
        By signing in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>

    </div>
  </div>

  <div class="photo-credit">Isla Farallón, Coclé, Panama</div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      btn.textContent = 'Signing in...';
      btn.classList.add('loading');
      btn.disabled = true;
      err.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });

        if (res.ok) {
          const data = await res.json();
          btn.textContent = 'Welcome! 🌊';
          setTimeout(() => {
            const routes = { business: '/business', hoa: '/hoa' };
            window.location.href = routes[data.role] || '/app';
          }, 600);
        } else {
          err.classList.add('show');
          btn.textContent = 'Sign In';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      } catch (ex) {
        err.textContent = 'Connection error. Please try again.';
        err.classList.add('show');
        btn.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function quickLogin(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.getElementById('loginForm').requestSubmit();
    }

    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => r.ok ? r.json() : null)
      .then(data => { if (data) { const routes = { business: '/business', hoa: '/hoa' }; window.location.href = routes[data.role] || '/app'; } })
      .catch(() => {});
  </script>
</body>
</html>
