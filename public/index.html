<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Neighbors — Costa Blanca Villas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean: #0077B6;
      --ocean-dark: #005F92;
      --ocean-light: #90E0EF;
      --sand: #F5CBA7;
      --sand-light: #FFF9F0;
      --coral: #E76F51;
      --seafoam: #2A9D8F;
      --sky: #CAF0F8;
      --navy: #03045E;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-y: auto;
      background: linear-gradient(160deg,
        #0d2b4e 0%,
        #0a4a7c 25%,
        #0077B6 50%,
        #E07850 70%,
        #F5CBA7 85%,
        #FFF9F0 100%
      );
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px 16px;
    }

    /* Animated sky particles */
    .stars {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50%;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--opacity, 0.8); }
    }

    /* Wave at bottom */
    .wave-container {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      pointer-events: none;
      overflow: hidden;
    }

    .wave {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 100%;
    }

    .wave-1 {
      fill: rgba(144, 224, 239, 0.35);
      animation: wave-move 8s ease-in-out infinite;
    }

    .wave-2 {
      fill: rgba(0, 119, 182, 0.25);
      animation: wave-move 12s ease-in-out infinite reverse;
      bottom: -10px;
    }

    .wave-3 {
      fill: rgba(0, 119, 182, 0.4);
      animation: wave-move 6s ease-in-out infinite 2s;
      bottom: -20px;
    }

    @keyframes wave-move {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-25%); }
    }

    /* Login card */
    .login-wrapper {
      position: relative;
      z-index: 10;
      animation: floatIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 48px 52px;
      width: min(440px, 100%);
      box-shadow:
        0 24px 80px rgba(0, 60, 120, 0.25),
        0 8px 24px rgba(0, 60, 120, 0.1),
        inset 0 1px 0 rgba(255,255,255,0.9);
      animation: float-card 6s ease-in-out infinite 1s;
    }

    @keyframes float-card {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(0, 119, 182, 0.35);
      overflow: hidden;
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 24px;
    }

    .logo-title {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #0077B6, #2A9D8F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 8px;
      display: none;
    }

    .logo-tagline {
      font-size: 14px;
      color: #6B7A8D;
      font-weight: 400;
      letter-spacing: 0.2px;
    }

    .neighborhood-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(0,119,182,0.08), rgba(42,157,143,0.08));
      border: 1px solid rgba(0,119,182,0.15);
      border-radius: 20px;
      padding: 6px 14px;
      margin-top: 12px;
      font-size: 12px;
      font-weight: 600;
      color: #0077B6;
    }

    .neighborhood-badge::before {
      content: '📍';
      font-size: 12px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 7px;
      letter-spacing: 0.2px;
    }

    input {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid #E5EBF2;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #1A2B3C;
      background: #FAFCFF;
      transition: all 0.2s ease;
      outline: none;
    }

    input:focus {
      border-color: #0077B6;
      background: white;
      box-shadow: 0 0 0 4px rgba(0, 119, 182, 0.1);
    }

    input::placeholder {
      color: #9AA5B4;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0077B6, #005F92);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(0, 119, 182, 0.35);
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0, 119, 182, 0.45);
    }

    .btn-login:hover::after { opacity: 1; }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login.loading {
      opacity: 0.8;
      cursor: not-allowed;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #9AA5B4;
      font-size: 12px;
      font-weight: 500;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #E5EBF2;
    }

    .demo-credentials {
      background: linear-gradient(135deg, rgba(42,157,143,0.06), rgba(0,119,182,0.06));
      border: 1px solid rgba(42,157,143,0.2);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .demo-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #2A9D8F;
      margin-bottom: 8px;
    }

    .demo-cred {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .demo-cred:last-child { margin-bottom: 0; }

    .demo-cred span {
      font-size: 13px;
      color: #4A5568;
    }

    .demo-cred strong {
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      color: #0077B6;
      background: rgba(0,119,182,0.08);
      padding: 2px 8px;
      border-radius: 6px;
    }

    .quick-login {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .quick-login-btn {
      flex: 1;
      padding: 8px;
      background: white;
      border: 1.5px solid #E5EBF2;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .quick-login-btn:hover {
      border-color: #0077B6;
      color: #0077B6;
      background: rgba(0,119,182,0.04);
      transform: translateY(-1px);
    }

    .avatar-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .error-msg {
      background: rgba(231, 111, 81, 0.1);
      border: 1px solid rgba(231, 111, 81, 0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #E76F51;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #9AA5B4;
    }

    .footer-text a {
      color: #0077B6;
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; border-radius: 20px; }
      .logo-icon { width: 72px; height: 72px; }
      .float-card { animation: none; }
    }

    /* Seagulls */
    .seagull {
      position: fixed;
      font-size: 20px;
      opacity: 0.6;
      animation: fly var(--fly-d, 20s) linear infinite var(--fly-delay, 0s);
      top: var(--fly-top, 15%);
    }

    @keyframes fly {
      from { transform: translateX(-100px) scaleX(1); left: -5%; }
      49% { transform: translateX(0) scaleX(1); }
      50% { transform: translateX(0) scaleX(-1); }
      to { transform: translateX(100px) scaleX(-1); left: 105%; }
    }
  </style>
</head>
<body>

  <!-- Animated stars -->
  <div class="stars" id="stars"></div>

  <!-- Seagulls -->
  <div class="seagull" style="--fly-top:8%; --fly-d:22s; --fly-delay:0s;">🕊️</div>
  <div class="seagull" style="--fly-top:14%; --fly-d:18s; --fly-delay:4s; font-size:14px;">🕊️</div>
  <div class="seagull" style="--fly-top:6%; --fly-d:26s; --fly-delay:10s;">🕊️</div>

  <!-- Wave -->
  <div class="wave-container">
    <svg class="wave wave-1" viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,80 C180,20 360,140 540,80 C720,20 900,140 1080,80 C1260,20 1380,120 1440,90 L1440,160 L0,160 Z"/>
    </svg>
    <svg class="wave wave-2" viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,100 C200,40 400,160 600,100 C800,40 1000,160 1200,100 C1300,70 1380,120 1440,110 L1440,160 L0,160 Z"/>
    </svg>
    <svg class="wave wave-3" viewBox="0 0 1440 160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,120 C240,60 480,160 720,120 C960,80 1200,160 1440,130 L1440,160 L0,160 Z"/>
    </svg>
  </div>

  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-area">
        <div class="logo-icon">
          <img src="/logo.png" alt="Good Neighbors">
        </div>
        <div class="logo-title">Good Neighbors</div>
        <div class="logo-tagline">Your neighborhood, connected</div>
        <div class="neighborhood-badge">Costa Blanca Villas, Farallón, Panama</div>
      </div>

      <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          Sign In to Good Neighbors
        </button>
      </form>

      <div class="divider">Demo accounts</div>

      <div class="demo-credentials">
        <div class="demo-label">🏖️ Quick access</div>
        <div class="demo-cred">
          <span>Sarah Bailey</span>
          <strong>sarah / beach123</strong>
        </div>
        <div class="demo-cred">
          <span>Mike Hart</span>
          <strong>mike / beach123</strong>
        </div>
        <div class="quick-login">
          <button class="quick-login-btn" onclick="quickLogin('sarah','beach123')">
            <span class="avatar-dot" style="background:#0077B6">SB</span>
            Sarah
          </button>
          <button class="quick-login-btn" onclick="quickLogin('mike','beach123')">
            <span class="avatar-dot" style="background:#F4A261">MH</span>
            Mike
          </button>
          <button class="quick-login-btn" onclick="quickLogin('admin','admin123')">
            <span class="avatar-dot" style="background:#6D6875">SP</span>
            Steve
          </button>
        </div>
      </div>

      <div class="footer-text">
        By signing in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
      </div>
    </div>
  </div>

  <script>
    // Stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        --d: ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 4}s;
        --opacity: ${0.4 + Math.random() * 0.6};
        width: ${1 + Math.random() * 2}px;
        height: ${1 + Math.random() * 2}px;
      `;
      starsContainer.appendChild(star);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');

      btn.textContent = 'Signing in...';
      btn.classList.add('loading');
      btn.disabled = true;
      err.classList.remove('show');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });

        if (res.ok) {
          btn.textContent = 'Welcome back! 🌊';
          setTimeout(() => { window.location.href = '/app'; }, 600);
        } else {
          err.classList.add('show');
          btn.textContent = 'Sign In to Good Neighbors';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      } catch (ex) {
        err.textContent = 'Connection error. Please try again.';
        err.classList.add('show');
        btn.textContent = 'Sign In to Good Neighbors';
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function quickLogin(username, password) {
      document.getElementById('username').value = username;
      document.getElementById('password').value = password;
      document.getElementById('loginForm').requestSubmit();
    }

    // Check if already logged in
    fetch('/api/auth/me', { credentials: 'include' })
      .then(r => { if (r.ok) window.location.href = '/app'; })
      .catch(() => {});
  </script>
</body>
</html>
